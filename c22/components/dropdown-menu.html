<!-- basecoat: Dropdown Menu (.dropdown-menu) = Trigger-Button + Popover-Menü mit role=menu/menuitem/menuitemcheckbox/menuitemradio/group/heading/separator. data-variant="destructive" für gefährliche Aktionen, data-indicator für das Häkchen/Punkt bei Checkbox-/Radio-Einträgen, data-inset zum Einrücken von Einträgen ohne Icon (damit sie mit iconbestückten Einträgen fluchten), kbd/.kbd bzw. [data-shortcut] für Tastenkürzel, aria-disabled für deaktivierte Einträge. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard</span>
    <div class="dropdown-menu" id="c22-dd">
      <button type="button" class="btn" data-variant="outline" id="c22-dd-trigger" aria-haspopup="menu" aria-controls="c22-dd-menu" aria-expanded="false">Optionen</button>
      <div id="c22-dd-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd-menu" aria-labelledby="c22-dd-trigger">
          <div role="group" aria-labelledby="c22-dd-h"><div role="heading" id="c22-dd-h">Mein Konto</div>
            <button type="button" role="menuitem">Profil</button>
            <button type="button" role="menuitem">Abrechnung</button>
            <button type="button" role="menuitem">Einstellungen</button>
          </div>
          <hr role="separator">
          <button type="button" role="menuitem" data-variant="destructive">Abmelden</button>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Icons &amp; Tastenkürzeln</span>
    <div class="dropdown-menu" id="c22-dd2">

      <div id="c22-dd2-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd2-menu" aria-labelledby="c22-dd2-trigger">
          <button type="button" role="menuitem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profil<span class="ms-auto flex items-center gap-1"><kbd class="kbd">Strg</kbd><kbd class="kbd">P</kbd></span></button>
          <button type="button" role="menuitem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>Abrechnung<span class="ms-auto flex items-center gap-1"><kbd class="kbd">Strg</kbd><kbd class="kbd">B</kbd></span></button>
          <button type="button" role="menuitem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>Einstellungen<span class="ms-auto flex items-center gap-1"><kbd class="kbd">Strg</kbd><kbd class="kbd">,</kbd></span></button>

          <button type="button" role="menuitem" data-variant="destructive"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>Abmelden</button>

      </div>
    </div>

  <div class="c22-example">
    <span class="c22-example-label">Checkboxen</span>
    <div class="dropdown-menu" id="c22-dd3">
      <button type="button" class="btn" data-variant="outline" id="c22-dd3-trigger" aria-haspopup="menu" aria-controls="c22-dd3-menu" aria-expanded="false">Ansicht</button>
      <div id="c22-dd3-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd3-menu" aria-labelledby="c22-dd3-trigger">
          <div role="group" aria-labelledby="c22-dd3-h"><div role="heading" id="c22-dd3-h">Anzeigen</div>
            <button type="button" role="menuitemcheckbox" aria-checked="true"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Statusleiste</button>
            <button type="button" role="menuitemcheckbox" aria-checked="true"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Aktivitätsleiste</button>
            <button type="button" role="menuitemcheckbox" aria-checked="false"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Seitenleiste</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Radiogruppe</span>

      <button type="button" class="btn" data-variant="outline" id="c22-dd4-trigger" aria-haspopup="menu" aria-controls="c22-dd4-menu" aria-expanded="false">Sortieren</button>
      <div id="c22-dd4-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd4-menu" aria-labelledby="c22-dd4-trigger">
          <div role="group" aria-labelledby="c22-dd4-h"><div role="heading" id="c22-dd4-h">Sortieren nach</div>
            <button type="button" role="menuitemradio" aria-checked="true"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="6"/></svg></span>Name</button>
            <button type="button" role="menuitemradio" aria-checked="false"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="6"/></svg></span>Datum</button>
            <button type="button" role="menuitemradio" aria-checked="false"><span data-indicator><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="6"/></svg></span>Größe</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Radiogruppe — Markierung fett</span>
    <div class="dropdown-menu" id="c22-dd6">
      <button type="button" class="btn" data-variant="outline" id="c22-dd6-trigger" aria-haspopup="menu" aria-controls="c22-dd6-menu" aria-expanded="false">Sortieren</button>
      <div id="c22-dd6-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd6-menu" aria-labelledby="c22-dd6-trigger" data-mark="bold">
          <div role="group" aria-labelledby="c22-dd6-h"><div role="heading" id="c22-dd6-h">Sortieren nach</div>
            <button type="button" role="menuitemradio" aria-checked="true">Name</button>
            <button type="button" role="menuitemradio" aria-checked="false">Datum</button>
            <button type="button" role="menuitemradio" aria-checked="false">Größe</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Radiogruppe — Markierung fett + Hintergrund</span>
    <div class="dropdown-menu" id="c22-dd7">
      <button type="button" class="btn" data-variant="outline" id="c22-dd7-trigger" aria-haspopup="menu" aria-controls="c22-dd7-menu" aria-expanded="false">Sortieren</button>
      <div id="c22-dd7-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-dd7-menu" aria-labelledby="c22-dd7-trigger" data-mark="bold bg">
          <div role="group" aria-labelledby="c22-dd7-h"><div role="heading" id="c22-dd7-h">Sortieren nach</div>
            <button type="button" role="menuitemradio" aria-checked="true">Name</button>
            <button type="button" role="menuitemradio" aria-checked="false">Datum</button>
            <button type="button" role="menuitemradio" aria-checked="false">Größe</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Eingerückt &amp; deaktiviert</span>
    <div class="dropdown-menu" id="c22-dd5">
      <button type="button" class="btn" data-variant="outline" id="c22-dd5-trigger" aria-haspopup="menu" aria-controls="c22-dd5-menu" aria-expanded="false">Datei</button>
      <div id="c22-dd5-popover" data-popover aria-hidden="true">

          <button type="button" role="menuitem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="M9 15h6"/></svg>Neu<span class="ms-auto flex items-center gap-1"><kbd class="kbd">Strg</kbd><kbd class="kbd">N</kbd></span></button>

    </div>
  </div>
</div>
