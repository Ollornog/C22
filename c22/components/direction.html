<!-- custom: Direction = Schreibrichtung (LTR/RTL) über das dir-Attribut auf einem Container. Layout mit logischen Tailwind-Utilities (ps-/pe-/border-s/text-start, dazu rtl:/ltr:-Varianten) passt sich automatisch an – kein hartcodiertes left/right nötig. In shadcn ein reiner Context-Provider ohne eigenes Markup; hier als sichtbarer Vorher/Nachher-Vergleich gebaut. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (LTR)</span>
    <div dir="ltr" class="w-full max-w-sm rounded-lg border p-4">
      <div class="text-muted-foreground mb-3 font-mono text-xs">dir="ltr"</div>
      <div class="flex items-center gap-3">
        <span class="bg-primary text-primary-foreground flex size-9 shrink-0 items-center justify-center rounded-full text-sm font-medium">LE</span>
        <div class="flex-1 text-start">
          <p class="text-sm font-medium">Neue Nachricht</p>
          <p class="text-muted-foreground text-xs">Lena hat dir geschrieben</p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground size-4 shrink-0 rtl:-scale-x-100"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Rechts nach links (dir="rtl")</span>
    <div dir="rtl" class="w-full max-w-sm rounded-lg border p-4">
      <div class="text-muted-foreground mb-3 font-mono text-xs">dir="rtl"</div>
      <div class="flex items-center gap-3">
        <span class="bg-primary text-primary-foreground flex size-9 shrink-0 items-center justify-center rounded-full text-sm font-medium">لي</span>
        <div class="flex-1 text-start">
          <p class="text-sm font-medium">رسالة جديدة</p>
          <p class="text-muted-foreground text-xs">كتبت لك لينا</p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground size-4 shrink-0 rtl:-scale-x-100"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Formularfeld mit Icon (logisch: <code class="text-[11px]">ps-9</code> + <code class="text-[11px]">start-3</code>)</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <div dir="ltr" class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground pointer-events-none absolute inset-y-0 start-3 my-auto size-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen …" class="input ps-9">
      </div>
      <div dir="rtl" class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground pointer-events-none absolute inset-y-0 start-3 my-auto size-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="بحث …" class="input ps-9">
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Aktionsleiste (Button-Reihenfolge dreht sich mit)</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <div dir="ltr" class="flex items-center justify-end gap-2 rounded-lg border p-3">
        <button type="button" class="btn" data-variant="outline" data-size="sm">Abbrechen</button>
        <button type="button" class="btn" data-size="sm">Speichern</button>
      </div>
      <div dir="rtl" class="flex items-center justify-end gap-2 rounded-lg border p-3">
        <button type="button" class="btn" data-variant="outline" data-size="sm">إلغاء</button>
        <button type="button" class="btn" data-size="sm">حفظ</button>
      </div>
    </div>
  </div>
</div>
