<!-- shadcn/custom: einzelnes Toggle über .btn + aria-pressed (Basecoat hat kein eigenes Toggle-CSS). variant="outline" = Rahmen, data-size steuert Höhe/Icon-Größe. Für zusammenhängende Gruppen siehe toggle-group.html. Klick toggelt aria-pressed inline (Demo-JS). -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (Ghost, icon-only — Textformatierung)</span>
    <div class="flex justify-center gap-2">
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="ghost" data-size="icon" aria-pressed="true" aria-label="Fett" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><strong>B</strong></button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="ghost" data-size="icon" aria-pressed="false" aria-label="Kursiv" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><em>I</em></button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="ghost" data-size="icon" aria-pressed="false" aria-label="Unterstrichen" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><u>U</u></button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Umrandet (<code class="text-[11px]">data-variant="outline"</code>) — mit Text</span>
    <div class="flex flex-wrap justify-center gap-2">
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" aria-pressed="true" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>Favorit</button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" aria-pressed="false" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Erinnern</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Größen (icon-sm · icon · icon-lg)</span>
    <div class="flex items-center justify-center gap-2">
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" data-size="icon-sm" aria-pressed="false" aria-label="Anpinnen" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" data-size="icon" aria-pressed="true" aria-label="Anpinnen" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" data-size="icon-lg" aria-pressed="false" aria-label="Anpinnen" onclick="this.setAttribute('aria-pressed', this.getAttribute('aria-pressed')==='true'?'false':'true')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Deaktiviert (an · aus)</span>
    <div class="flex justify-center gap-2">
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" data-size="icon" aria-pressed="true" aria-label="Anpinnen" disabled><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
      <button type="button" class="btn aria-pressed:bg-accent aria-pressed:text-accent-foreground" data-variant="outline" data-size="icon" aria-pressed="false" aria-label="Anpinnen" disabled><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg></button>
    </div>
  </div>
</div>
