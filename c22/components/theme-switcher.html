<!-- basecoat: Theme Switcher = kein eigenes Basecoat-CSS-Modul, sondern die dokumentierte Kombi aus .btn (data-variant/data-size) + basecoat.js' eingebauter Theme-API. `window.basecoat.theme.toggle()`/`.set('light'|'dark')`/`.get()` togglen `html.dark`, schreiben `localStorage.themeMode` und feuern `basecoat:themechange` — das ist der einzig dokumentierte Mechanismus (vega.css hat dafür keine eigenen Klassen, nur `html.dark`-Selektoren für Komponenten wie Switch). "System" ist keine dritte basecoat-Stufe, sondern Komfort obendrauf: Override löschen + einmalig nach `prefers-color-scheme` setzen. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (Icon-Toggle)</span>
    <button type="button" class="btn" data-variant="outline" data-size="icon" data-tooltip="Hell/Dunkel wechseln" data-side="bottom" aria-label="Hell/Dunkel wechseln" onclick="window.basecoat.theme.toggle()">
      <svg data-icon-lu="sun" class="dark:hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      <svg data-icon-lu="moon" class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Dropdown (Hell · Dunkel · System)</span>
    <div class="dropdown-menu" id="c22-theme-dd">
      <button type="button" class="btn" data-variant="outline" data-size="icon" id="c22-theme-dd-trigger" aria-haspopup="menu" aria-controls="c22-theme-dd-menu" aria-expanded="false" aria-label="Theme wählen">
        <svg data-icon-lu="sun" class="dark:hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg data-icon-lu="moon" class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div id="c22-theme-dd-popover" data-popover aria-hidden="true">
        <div role="menu" id="c22-theme-dd-menu" aria-labelledby="c22-theme-dd-trigger">
          <div role="group" aria-labelledby="c22-theme-dd-h"><div role="heading" id="c22-theme-dd-h">Erscheinungsbild</div>
            <button type="button" role="menuitemradio" aria-checked="true" onclick="window.basecoat.theme.set('light');this.parentElement.querySelectorAll('[role=menuitemradio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><span data-indicator><svg data-icon-lu="check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Hell</button>
            <button type="button" role="menuitemradio" aria-checked="false" onclick="window.basecoat.theme.set('dark');this.parentElement.querySelectorAll('[role=menuitemradio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><span data-indicator><svg data-icon-lu="check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Dunkel</button>
            <button type="button" role="menuitemradio" aria-checked="false" onclick="try{localStorage.removeItem('themeMode')}catch(_){};window.basecoat.theme.set(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');this.parentElement.querySelectorAll('[role=menuitemradio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><span data-indicator><svg data-icon-lu="check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>System</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Segmentiert (Button-Group)</span>
    <div class="button-group" role="radiogroup" aria-label="Theme wählen">
      <button type="button" class="btn" data-variant="outline" data-size="sm" role="radio" aria-checked="true" onclick="window.basecoat.theme.set('light');this.parentElement.querySelectorAll('[role=radio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><svg data-icon-lu="sun" data-icon="inline-start" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>Hell</button>
      <button type="button" class="btn" data-variant="outline" data-size="sm" role="radio" aria-checked="false" onclick="window.basecoat.theme.set('dark');this.parentElement.querySelectorAll('[role=radio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><svg data-icon-lu="moon" data-icon="inline-start" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>Dunkel</button>
      <button type="button" class="btn" data-variant="outline" data-size="sm" role="radio" aria-checked="false" onclick="try{localStorage.removeItem('themeMode')}catch(_){};window.basecoat.theme.set(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');this.parentElement.querySelectorAll('[role=radio]').forEach(el=>el.setAttribute('aria-checked',el===this?'true':'false'))"><svg data-icon-lu="monitor" data-icon="inline-start" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>System</button>
    </div>
  </div>
</div>
