<!-- basecoat: Skeleton (.skeleton = animate-pulse + bg-muted + rounded-md). Kein Variant-System — Form/Größe rein per Utility-Klassen (size-*, h-*, w-*, rounded-*, aspect-*). -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (Avatar + Text)</span>
    <div class="flex w-full max-w-sm items-center gap-4">
      <div class="skeleton size-12 rounded-full"></div>
      <div class="flex flex-1 flex-col gap-2">
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-2/3"></div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Text (mehrzeilig)</span>
    <div class="flex w-full max-w-sm flex-col gap-2">
      <div class="skeleton h-4 w-full"></div>
      <div class="skeleton h-4 w-full"></div>
      <div class="skeleton h-4 w-3/4"></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Karte (Titel + Bild)</span>
    <div class="card w-full max-w-sm">
      <header>
        <div class="skeleton h-4 w-2/3"></div>
        <div class="skeleton h-4 w-1/2"></div>
      </header>
      <section>
        <div class="skeleton aspect-video w-full"></div>
      </section>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Formular</span>
    <div class="flex w-full max-w-sm flex-col gap-6">
      <div class="flex flex-col gap-3">
        <div class="skeleton h-4 w-20"></div>
        <div class="skeleton h-10 w-full"></div>
      </div>
      <div class="flex flex-col gap-3">
        <div class="skeleton h-4 w-24"></div>
        <div class="skeleton h-10 w-full"></div>
      </div>
      <div class="skeleton h-9 w-24"></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Tabelle</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <div class="flex gap-4">
        <div class="skeleton h-4 flex-1"></div>
        <div class="skeleton h-4 w-16"></div>
        <div class="skeleton h-4 w-14"></div>
      </div>
      <div class="flex gap-4">
        <div class="skeleton h-4 flex-1"></div>
        <div class="skeleton h-4 w-16"></div>
        <div class="skeleton h-4 w-14"></div>
      </div>
      <div class="flex gap-4">
        <div class="skeleton h-4 flex-1"></div>
        <div class="skeleton h-4 w-16"></div>
        <div class="skeleton h-4 w-14"></div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Formen (Kreis · Pille · Rechteck)</span>
    <div class="flex flex-wrap items-center justify-center gap-4">
      <div class="skeleton size-12 rounded-full"></div>
      <div class="skeleton h-8 w-24 rounded-full"></div>
      <div class="skeleton h-16 w-24 rounded-lg"></div>
    </div>
  </div>
</div>
