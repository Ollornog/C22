<!-- basecoat: Progress (.progress > span, Breite per Inline-Style). Kein natives data-variant/data-size — Statusfarben/Größen per Utility-Override auf dem Füllbalken. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (mehrere Werte)</span>
    <div class="flex w-full max-w-sm flex-col gap-4">
      <div class="progress" role="progressbar" aria-label="Fortschritt" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100"><span style="width:20%"></span></div>
      <div class="progress" role="progressbar" aria-label="Fortschritt" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span style="width:60%"></span></div>
      <div class="progress" role="progressbar" aria-label="Fortschritt" aria-valuenow="92" aria-valuemin="0" aria-valuemax="100"><span style="width:92%"></span></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Beschriftung &amp; Wert</span>
    <div class="w-full max-w-sm">
      <div class="mb-2 flex items-center justify-between text-sm">
        <label for="c22-progress-upload" class="font-medium">Wird hochgeladen …</label>
        <output for="c22-progress-upload" class="text-muted-foreground">66 %</output>
      </div>
      <div id="c22-progress-upload" class="progress" role="progressbar" aria-label="Wird hochgeladen" aria-valuenow="66" aria-valuemin="0" aria-valuemax="100"><span style="width:66%"></span></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Statusfarben (Erfolg · Warnung · Fehler)</span>
    <div class="flex w-full max-w-sm flex-col gap-4">
      <div class="progress" role="progressbar" aria-label="Erfolgreich" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"><span class="bg-success!" style="width:100%"></span></div>
      <div class="progress" role="progressbar" aria-label="Wird knapp" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100"><span class="bg-warning!" style="width:85%"></span></div>
      <div class="progress" role="progressbar" aria-label="Fehlgeschlagen" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100"><span class="bg-destructive!" style="width:45%"></span></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Größen (dünn · Standard · dick)</span>
    <div class="flex w-full max-w-sm flex-col gap-4">
      <div class="progress h-1!" role="progressbar" aria-label="Dünn" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100"><span style="width:40%"></span></div>
      <div class="progress" role="progressbar" aria-label="Standard" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span style="width:60%"></span></div>
      <div class="progress h-3!" role="progressbar" aria-label="Dick" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"><span style="width:80%"></span></div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">In einer Karte (Datei-Upload)</span>
    <div class="card w-full max-w-sm">
      <section class="flex items-center gap-3">
        <span class="item-media">
          <svg data-icon-lu="file" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        </span>
        <div class="min-w-0 flex-1">
          <div class="mb-1.5 flex items-center justify-between gap-2">
            <span class="truncate text-sm font-medium">Praesentation-Q3.pdf</span>
            <span class="text-muted-foreground shrink-0 text-xs">74 %</span>
          </div>
          <div class="progress" role="progressbar" aria-label="Praesentation-Q3.pdf wird hochgeladen" aria-valuenow="74" aria-valuemin="0" aria-valuemax="100"><span style="width:74%"></span></div>
        </div>
        <button type="button" class="btn" data-variant="ghost" data-size="icon-sm" aria-label="Hochladen abbrechen"><svg data-icon-lu="x" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </section>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Rechts-nach-links (dir="rtl")</span>
    <div class="w-full max-w-sm" dir="rtl">
      <div class="progress" role="progressbar" aria-label="التقدم" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"><span style="width:60%"></span></div>
    </div>
  </div>
</div>
