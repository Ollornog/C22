<!-- basecoat: Sonner = Toast-Benachrichtigungen (.toaster/.toast/.toast-content), Kategorien success/error/info/warning, Footer mit Aktion/Abbrechen, data-duration (-1 = dauerhaft), data-align (start/center/end). Trigger lösen einen echten Basecoat-Toast über den gemeinsamen #toaster-Container aus (wird bei Bedarf selbst angelegt/initialisiert). -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (Kategorien)</span>
    <div class="flex flex-wrap items-center justify-center gap-3">
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'success', title:'Datei hochgeladen', description:'bericht.pdf wurde gespeichert.'})">Erfolg</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'info', title:'Neue Version', description:'v2.4.0 ist verfügbar.'})">Info</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'warning', title:'Speicher wird knapp', description:'Nur noch 200 MB frei.'})">Warnung</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'error', title:'Senden fehlgeschlagen', description:'Bitte erneut versuchen.'})">Fehler</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Aktion &amp; Abbrechen (<code class="text-[11px]">footer</code>)</span>
    <div class="flex flex-wrap items-center justify-center gap-3">
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'success', title:'Datei gelöscht', description:'entwurf.md wurde entfernt.', action:{label:'Rückgängig', href:'#'}})">Mit Aktion</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'info', title:'Neue Anfrage', description:'Mara möchte dich als Kontakt hinzufügen.', action:{label:'Annehmen', href:'#'}, cancel:{label:'Ablehnen'}})">Aktion + Abbrechen</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Dauerhaft (<code class="text-[11px]">data-duration="-1"</code>, kein Auto-Schließen)</span>
    <div class="flex flex-wrap items-center justify-center gap-3">
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'warning', title:'Update verfügbar', description:'Starte neu, um Version 3 zu installieren.', duration:-1, cancel:{label:'Später'}})">Dauerhafter Hinweis</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="var t=document.getElementById('toaster'); if (t &amp;&amp; t.closeAll) t.closeAll();">Alle schließen</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Ausrichtung (<code class="text-[11px]">data-align</code>: start · center · end)</span>
    <div class="flex flex-wrap items-center justify-center gap-3">
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'info', title:'Linksbündig', description:'data-align=&quot;start&quot;'}, 'start')">Links</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'info', title:'Zentriert', description:'data-align=&quot;center&quot;'}, 'center')">Mitte</button>
      <button type="button" class="btn" data-variant="outline"
        onclick="c22SonnerToast({category:'info', title:'Rechtsbündig', description:'data-align=&quot;end&quot; (Standard)'}, 'end')">Rechts</button>
    </div>
  </div>
</div>
<script>
  function c22SonnerToast(config, align) {
    var t = document.getElementById('toaster');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toaster';
      t.className = 'toaster';
      document.body.appendChild(t);
    }
    if (align) t.dataset.align = align;
    if (!t.toast && window.basecoat && window.basecoat.init) window.basecoat.init('toaster', {force: true});
    if (t.toast) t.toast(config);
  }
</script>
