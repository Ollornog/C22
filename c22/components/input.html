<!-- basecoat: Input (.input). Klasse greift auf jedes <input type="text|email|password|number|file|tel|url|search|date|…">. Fehlerzustand via aria-invalid="true" (kein eigenes CSS nötig). Label/Feld-Text = eigene Components (field, label). -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (Text · E-Mail · Passwort · Zahl · Datum)</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <input class="input" type="text" placeholder="Vor- und Nachname">
      <input class="input" type="email" placeholder="name@example.com">
      <input class="input" type="password" placeholder="Passwort">
      <input class="input" type="number" placeholder="42">
      <input class="input" type="date">
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Icon (Suche links · Betrag rechts)</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground pointer-events-none absolute inset-y-0 start-3 my-auto size-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="input ps-9" type="search" placeholder="Suchen …">
      </div>
      <div class="relative">
        <input class="input pe-9" type="number" placeholder="0,00">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground pointer-events-none absolute inset-y-0 end-3 my-auto size-4"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Datei-Upload</span>
    <div class="w-full max-w-sm">
      <input class="input" type="file">
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Zustände (Deaktiviert · Schreibgeschützt · Ungültig)</span>
    <div class="flex w-full max-w-sm flex-col gap-3">
      <input class="input" type="text" placeholder="Deaktiviert" disabled>
      <input class="input" type="text" value="Nur lesbar" readonly>
      <input class="input" type="email" aria-invalid="true" value="keine E-Mail">
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Rechts-nach-links (arabisch/hebräisch)</span>
    <div class="w-full max-w-sm" dir="rtl">
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground pointer-events-none absolute inset-y-0 start-3 my-auto size-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="input ps-9" type="search" dir="rtl" placeholder="بحث …">
      </div>
    </div>
  </div>
</div>
