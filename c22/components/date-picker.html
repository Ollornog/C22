<!-- custom: Date Picker = Trigger (.popover, Basecoat) + der SPOT-Kalender aus calendar.html
     (<div data-calendar …>, gerendert/bedient von c22.js — Blättern, Auswahl, Bereich, Dropdown).
     KEINE eigenen Kalendertabellen hier: jede Kalender-Optik/-Logik lebt in EINER Stelle (#12);
     der Date Picker liefert nur Hülle (Trigger, Popover) plus die Zeit-Bausteine data-clock /
     data-time-stepper und die Datums-Eingabe data-date-input (alle c22.js).
     Im Popover trägt der Inhalt p-3 statt `rounded-lg border p-3` — den Rahmen stellt das Panel. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Einzeldatum</span>
    <div class="popover w-fit" id="c22-dp1">
      <button type="button" class="btn justify-start gap-2" data-variant="outline" id="c22-dp1-trigger" aria-expanded="false" aria-controls="c22-dp1-popover">
        <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        15. Juli 2026
      </button>
      <div id="c22-dp1-popover" data-popover aria-hidden="true">
        <div data-calendar data-mode="single" data-month="2026-07" data-selected="2026-07-15" class="w-fit p-3"></div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Zeitraum</span>
    <div class="popover w-fit" id="c22-dp2">
      <button type="button" class="btn justify-start gap-2" data-variant="outline" id="c22-dp2-trigger" aria-expanded="false" aria-controls="c22-dp2-popover">
        <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        12. – 19. Juli 2026
      </button>
      <div id="c22-dp2-popover" data-popover aria-hidden="true">
        <div data-calendar data-mode="range" data-month="2026-07" data-selected="2026-07-12/2026-07-19" class="w-fit p-3"></div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Uhrzeit (Uhr)</span>
    <div class="popover w-fit" id="c22-dp3">
      <button type="button" class="btn justify-start gap-2" data-variant="outline" id="c22-dp3-trigger" aria-expanded="false" aria-controls="c22-dp3-popover">
        <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        15. Juli 2026, 14:30
      </button>
      <div id="c22-dp3-popover" data-popover aria-hidden="true">
        <div class="flex flex-col gap-4 p-3 sm:flex-row">
          <div data-calendar data-mode="single" data-month="2026-07" data-selected="2026-07-15" class="w-fit"></div>
          <div class="border-t pt-4 sm:border-t-0 sm:border-s sm:ps-4 sm:pt-0">
            <div data-clock data-input data-value="14:30"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Mit Uhrzeit (Stepper)</span>
    <div class="popover w-fit" id="c22-dp6">
      <button type="button" class="btn justify-start gap-2" data-variant="outline" id="c22-dp6-trigger" aria-expanded="false" aria-controls="c22-dp6-popover">
        <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        15. Juli 2026, 14:30
      </button>
      <div id="c22-dp6-popover" data-popover aria-hidden="true">
        <div class="w-fit p-3">
          <div data-calendar data-mode="single" data-month="2026-07" data-selected="2026-07-15" class="w-fit"></div>
          <div class="border-t pt-2 mt-3">
            <div data-time-stepper data-value="14:30"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Per Texteingabe (aktives Feld öffnet sofort)</span>
    <div class="input-group w-full max-w-56">
      <input class="input" type="text" placeholder="tt.mm.jjjj" value="15.07.2026" data-date-input aria-controls="c22-dp4-popover" aria-expanded="false" aria-haspopup="dialog" autocomplete="off" aria-label="Datum">
      <div class="popover" id="c22-dp4">
        <button type="button" class="btn" data-variant="ghost" data-size="icon-sm" id="c22-dp4-trigger" aria-expanded="false" aria-controls="c22-dp4-popover" aria-label="Kalender öffnen">
          <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        </button>
        <div id="c22-dp4-popover" data-popover data-side="bottom" data-align="end" aria-hidden="true">
          <div data-calendar data-mode="single" data-month="2026-07" data-selected="2026-07-15" class="w-fit p-3"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Per Texteingabe (öffnet nur über das Kalender-Symbol)</span>
    <div class="input-group w-full max-w-56">
      <input class="input" type="text" placeholder="tt.mm.jjjj" value="15.07.2026" aria-label="Datum">
      <div class="popover" id="c22-dp8">
        <button type="button" class="btn" data-variant="ghost" data-size="icon-sm" id="c22-dp8-trigger" aria-expanded="false" aria-controls="c22-dp8-popover" aria-label="Kalender öffnen">
          <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        </button>
        <div id="c22-dp8-popover" data-popover data-side="bottom" data-align="end" aria-hidden="true">
          <div data-calendar data-mode="single" data-month="2026-07" data-selected="2026-07-15" class="w-fit p-3"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Geburtsdatum (Monat/Jahr-Dropdown)</span>
    <div class="popover w-fit" id="c22-dp5">
      <button type="button" class="btn justify-start gap-2" data-variant="outline" id="c22-dp5-trigger" aria-expanded="false" aria-controls="c22-dp5-popover">
        <svg data-icon-lu="calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span class="text-muted-foreground">Geburtsdatum wählen</span>
      </button>
      <div id="c22-dp5-popover" data-popover aria-hidden="true">
        <div data-calendar data-mode="single" data-dropdown data-month="2008-07" class="w-fit p-3"></div>
      </div>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Geburtsdatum per Texteingabe</span>
    <div class="relative w-fit" id="c22-dp7">
      <input class="input w-40" type="text" id="c22-dp7-input" data-date-input placeholder="tt.mm.jjjj" aria-controls="c22-dp7-popover" aria-expanded="false" aria-haspopup="dialog" autocomplete="off" aria-label="Geburtsdatum">
      <div id="c22-dp7-popover" data-popover aria-hidden="true">
        <div data-calendar data-mode="single" data-dropdown data-month="2008-07" class="w-fit p-3"></div>
      </div>
    </div>
  </div>
</div>
