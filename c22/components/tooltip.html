<!-- basecoat: Tooltip = reines CSS ([data-tooltip], kein JS/Popover), Text kommt aus dem Attributwert selbst (content: attr(data-tooltip)) -- daher NUR Klartext, keine Icons/kbd/HTML im Tooltip-Inhalt. Seite über data-side ("top"/"bottom"/"left"/"right", zusätzlich die RTL-sicheren "inline-start"/"inline-end"; ohne data-side = "top"), Ausrichtung über data-align ("start"/"center"/"end", Vorgabe "center"). Zeigt laut vendored CSS NUR bei echtem Maus-Hover (`:hover:before`) -- `:focus-visible:not(:hover)` blendet aktiv aus, reiner Tastatur-Fokus zeigt also KEINEN Tooltip. Für rein informative Zusatztexte an interaktiven Elementen ok; wo die Information wichtig ist, zusätzlich aria-label/sichtbaren Text vorsehen oder auf .popover (hover-card.html/popover.html) ausweichen. -->
<div class="c22-examples">
  <div class="c22-example">
    <span class="c22-example-label">Standard (vier Seiten)</span>
    <div class="flex flex-wrap justify-center gap-4">
      <button type="button" class="btn" data-variant="outline" data-tooltip="Zur Startseite" data-side="top">oben</button>
      <button type="button" class="btn" data-variant="outline" data-tooltip="Einstellungen öffnen" data-side="bottom">unten</button>
      <button type="button" class="btn" data-variant="outline" data-tooltip="Zum vorherigen Schritt" data-side="left">links</button>
      <button type="button" class="btn" data-variant="outline" data-tooltip="Zum nächsten Schritt" data-side="right">rechts</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Ausrichtung (<code class="text-[11px]">data-align</code>: start · center · end)</span>
    <div class="flex flex-wrap justify-center gap-4">
      <button type="button" class="btn w-28" data-variant="outline" data-tooltip="Am linken Rand ausgerichtet" data-side="bottom" data-align="start">start</button>
      <button type="button" class="btn w-28" data-variant="outline" data-tooltip="Mittig ausgerichtet" data-side="bottom" data-align="center">center</button>
      <button type="button" class="btn w-28" data-variant="outline" data-tooltip="Am rechten Rand ausgerichtet" data-side="bottom" data-align="end">end</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Logische Seiten (<code class="text-[11px]">data-side="inline-start/inline-end"</code>, RTL-sicher)</span>
    <div class="flex flex-wrap justify-center gap-4">
      <button type="button" class="btn" data-variant="outline" data-tooltip="Textanfang (LTR: links, RTL: rechts)" data-side="inline-start">inline-start</button>
      <button type="button" class="btn" data-variant="outline" data-tooltip="Textende (LTR: rechts, RTL: links)" data-side="inline-end">inline-end</button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Icon-Button (mit <code class="text-[11px]">aria-label</code>)</span>
    <div class="flex flex-wrap justify-center gap-3">
      <button type="button" class="btn" data-variant="outline" data-size="icon" data-tooltip="Einstellungen" data-side="top" aria-label="Einstellungen"><svg data-icon-lu="settings" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
      <button type="button" class="btn" data-variant="outline" data-size="icon" data-tooltip="Herunterladen" data-side="top" aria-label="Herunterladen"><svg data-icon-lu="download" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></button>
      <button type="button" class="btn" data-variant="destructive" data-size="icon" data-tooltip="Unwiderruflich löschen" data-side="top" aria-label="Löschen"><svg data-icon-lu="trash" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Deaktiviertes Element (Span-Wrapper mit <code class="text-[11px]">tabindex</code>)</span>
    <div class="flex justify-center">
      <span tabindex="0" data-tooltip="Erst nach Freigabe durch die Teamleitung verfügbar" data-side="top" class="inline-block cursor-not-allowed"><button type="button" class="btn" data-variant="outline" disabled>Freigeben</button></span>
    </div>
  </div>
  <div class="c22-example">
    <span class="c22-example-label">Als Link (Ziel als Zusatzinfo)</span>
    <div class="flex justify-center">
      <a href="#" class="text-sm font-medium underline underline-offset-4" data-tooltip="Öffnet das Repository in einem neuen Tab" data-side="top">C22 auf GitHub</a>
    </div>
  </div>
</div>
